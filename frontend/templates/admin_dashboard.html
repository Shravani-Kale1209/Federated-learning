<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesseract | Global Admin Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        :root {
            --hosp-bg: #F9FBF8;
            --hosp-navy: #1B2A4E;
            --hosp-blue: #4A90E2;
            --hosp-white: #FFFFFF;
            --hosp-text: #2D3436;
            --hosp-border: #E1E8ED;
            --hosp-green: #4A90E2; /* Blue shade for primary actions */
            --hosp-red: #EB5757;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--hosp-bg);
            color: var(--hosp-text);
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--hosp-navy);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--hosp-white);
            border: 1px solid var(--hosp-border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }

        h2 { color: var(--hosp-navy); margin-top: 0; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-box {
            background: #F8FAFF;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #E9F0FF;
        }

        .stat-val { font-size: 1.8rem; font-weight: 700; color: var(--hosp-navy); display: block; }
        .stat-label { font-size: 0.8rem; color: #7F8C8D; text-transform: uppercase; }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--hosp-border); color: #7F8C8D; font-size: 0.9rem; }
        td { padding: 12px; border-bottom: 1px solid var(--hosp-border); }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-approve { background: var(--hosp-green); color: white; }
        .btn-approve:hover { opacity: 0.9; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; }
        .badge-pending { background: #FFF4E5; color: #D35400; }
        .badge-active { background: #E8F8F5; color: #16A085; }

        .hidden { display: none !important; }
        .contributor-list { font-size: 0.9rem; color: #7F8C8D; margin-top: 5px; }

    </style>
</head>
<body>

    <header>
        <div style="font-size: 1.5rem; font-weight: 700;">TESSERACT ADMIN</div>
        <div>
            <span id="status-light" style="display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--hosp-green); margin-right:5px;"></span>
            SYSTEM ONLINE
        </div>
    </header>

    <div class="container">
        <!-- LOGIN PANEL -->
        <div id="login-view" class="card" style="max-width: 400px; margin: 4rem auto;">
            <h2>Admin Authentication</h2>
            <p style="font-size: 0.9rem; color: #7F8C8D;">Secure Gateway Access</p>
            <input type="text" id="admin-user" placeholder="Admin Username (ADMIN)" style="width:100%; padding:10px; margin-bottom:1rem; border-radius:8px; border:1px solid var(--hosp-border);" value="ADMIN">
            <button class="btn btn-approve" style="width:100%;" onclick="adminLogin()">Request OTP</button>
        </div>

        <div id="admin-content" class="hidden">
            <!-- GLOBAL STATS -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Global Model Intelligence</h2>
                    <span id="sync-status" style="font-size: 0.8rem; color: var(--hosp-green);">● LIVE UPDATING</span>
                </div>
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-label">Model Accuracy</span>
                        <span id="stat-acc" class="stat-val">--%</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Federated Round</span>
                        <span id="stat-round" class="stat-val">--</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Round Progress</span>
                        <span id="stat-nodes" class="stat-val">0/2</span>
                        <div id="contributing-nodes" class="contributor-list">Waiting for nodes...</div>
                    </div>
                </div>
            </div>

            <!-- PENDING REQUESTS -->
            <div class="card">
                <h2>Pending Authorizations</h2>
                <table>
                    <thead><tr><th>Org ID</th><th>Name</th><th>Email</th><th>Action</th></tr></thead>
                    <tbody id="pending-list"></tbody>
                </table>
            </div>

            <!-- ACTIVE NETWORK -->
            <div class="card">
                <h2>Authorized Health Network</h2>
                <table>
                    <thead><tr><th>Org ID</th><th>Name</th><th>Status</th></tr></thead>
                    <tbody id="active-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let adminToken = null;

        async function adminLogin() {
            const username = document.getElementById('admin-user').value.toUpperCase();
            const res = await fetch('/api/auth/request-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username })
            });
            const data = await res.json();
            if (res.ok) {
                const otp = prompt("DEMO MODE: Admin OTP is " + data.debug_otp + "\nEnter it here:");
                if (!otp) return;
                
                const verifyRes = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, otp })
                });
                const verifyData = await verifyRes.json();
                if (verifyData.token) {
                    adminToken = verifyData.token;
                    document.getElementById('login-view').classList.add('hidden');
                    document.getElementById('admin-content').classList.remove('hidden');
                    loadData();
                    setInterval(loadData, 3000);
                } else {
                    alert("Verification failed");
                }
            } else {
                alert(data.detail || "Login failed");
            }
        }

        async function loadData() {
            if (!adminToken) return;
            try {
                const statsRes = await fetch('/api/stats', {
                    headers: {'Authorization': 'Bearer ' + adminToken}
                });
                const stats = await statsRes.json();
                document.getElementById('stat-acc').innerText = (stats.accuracy * 100).toFixed(1) + "%";
                document.getElementById('stat-round').innerText = stats.round_num;
                document.getElementById('stat-nodes').innerText = `${stats.nodes_active}/${stats.max_nodes}`;
                
                const contributors = stats.contributing.length > 0 
                    ? "In Round: " + stats.contributing.join(", ") 
                    : "Waiting for round start...";
                document.getElementById('contributing-nodes').innerText = contributors;

                const hospRes = await fetch('/api/admin/hospitals', {
                    headers: {'Authorization': 'Bearer ' + adminToken}
                });
                const hospitals = await hospRes.json();
                
                const pendingBody = document.getElementById('pending-list');
                const activeBody = document.getElementById('active-list');
                pendingBody.innerHTML = '';
                activeBody.innerHTML = '';

                for (const [id, info] of Object.entries(hospitals)) {
                    if (info.status === 'PENDING') {
                        pendingBody.innerHTML += `
                            <tr>
                                <td><strong>${id}</strong></td>
                                <td>${info.name}</td>
                                <td>${info.email}</td>
                                <td><button class="btn btn-approve" onclick="approve('${id}')">Authorize</button></td>
                            </tr>
                        `;
                    } else {
                        activeBody.innerHTML += `
                            <tr>
                                <td><strong>${id}</strong></td>
                                <td>${info.name}</td>
                                <td><span class="badge badge-active">${info.status}</span></td>
                            </tr>
                        `;
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function approve(org_id) {
            const res = await fetch(`/api/admin/approve-hospital/${org_id}`, { 
                method: 'POST',
                headers: {'Authorization': 'Bearer ' + adminToken}
            });
            if (res.ok) {
                loadData();
            }
        }
    </script>
</body>
</html>
