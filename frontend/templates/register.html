<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesseract | Hardware Verification & Registration</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        
        :root {
            --hosp-bg: #F9FBF8;
            --hosp-navy: #1B2A4E;
            --hosp-blue: #4A90E2;
            --hosp-white: #FFFFFF;
            --hosp-text: #2D3436;
            --hosp-border: #E1E8ED;
            --hosp-green: #3498DB; 
            --hosp-red: #EB5757;
            --shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--hosp-bg);
            color: var(--hosp-text);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        header {
            background: var(--hosp-navy);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 700px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--hosp-white);
            border: 1px solid var(--hosp-border);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
        }

        h2 { color: var(--hosp-navy); margin-top: 0; font-weight: 700; }
        p { color: #7F8C8D; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--hosp-navy); }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--hosp-border);
            border-radius: 8px;
            font-size: 1rem;
        }

        .compliance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
            background: #F8FAFC;
            padding: 1.5rem;
            border-radius: 10px;
            border: 1px dashed var(--hosp-border);
        }

        .file-input-wrapper {
            display: flex;
            flex-direction: column;
        }

        input[type="file"] {
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--hosp-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 2rem;
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.2);
        }
        .btn:hover { background: #357ABD; transform: translateY(-1px); }

        /* Cyber-Scan Overlay Styles */
        #cyber-scan-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 28, 0.98);
            z-index: 10000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00FF41; /* Classic Matrix Green */
            font-family: 'Courier New', Courier, monospace;
            padding: 2rem;
        }

        .terminal-box {
            width: 100%;
            max-width: 600px;
            height: 300px;
            background: #000;
            border: 1px solid #00FF41;
            border-radius: 8px;
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .scan-line { margin-bottom: 8px; opacity: 0; animation: typeIn 0.3s forwards; }
        @keyframes typeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .scan-status-ok { color: #00FF41; font-weight: bold; }
        .scan-status-wait { color: #FFB100; }
        .scan-status-secure { color: #00D1FF; font-weight: bold; }

        .spinner {
            border: 3px solid rgba(0, 255, 65, 0.1);
            border-top: 3px solid #00FF41;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 2rem;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 20px; right: 20px;
            background: var(--hosp-navy);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            z-index: 11000;
            transform: translateY(100px);
            transition: transform 0.3s ease;
        }
        .toast.show { transform: translateY(0); }

        .hidden { display: none !important; }
        .success-text { color: #27AE60; font-weight: 600; font-size: 0.85rem; margin-top: 5px; }
        .hash-tag { font-family: 'Courier New', Courier, monospace; font-size: 0.7rem; color: #7F8C8D; background: #EEE; padding: 2px 5px; border-radius: 4px; margin-top: 4px; display: block; word-break: break-all; }
        
        .certificate-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 20000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .cert-box {
            background: white;
            border: 8px double var(--hosp-navy);
            max-width: 600px;
            width: 100%;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
        }

        .cert-watermark {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 5rem; font-weight: 900; color: rgba(74, 144, 226, 0.05);
            pointer-events: none; white-space: nowrap;
        }

        .lei-status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding: 10px;
            background: #F0F7FF;
            border-radius: 8px;
            border: 1px solid #D0E3F7;
        }

        .btn-seal {
            background: #2C3E50;
            color: white;
            margin-top: 1rem;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.5;
            pointer-events: none;
        }
        .btn-seal.active { opacity: 1; pointer-events: auto; }
        .btn-seal:hover { background: #1A252F; }

        .verification-spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(74, 144, 226, 0.2);
            border-top: 2px solid var(--hosp-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 1.5rem; font-weight: 900; letter-spacing: 1px;">TESSERACT <span style="font-weight: 300;">SECURE</span></div>
        <div style="font-size: 0.8rem; opacity: 0.8; font-weight: 600;">HARDWARE ATTESTATION v2.0</div>
    </header>

    <div class="container">
        <div class="card">
            <div class="form-group">
                <label>Legal Entity Identifier (LEI)</label>
                <input type="text" id="reg-lei" maxlength="20" placeholder="Enter 20-Character Legal Entity Identifier">
                <div id="lei-verification-status" class="hidden">
                    <div class="lei-status">
                        <div class="verification-spinner" id="lei-loader"></div>
                        <span id="lei-text" style="font-size: 0.85rem; color: var(--hosp-blue);">Checking Global Database...</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Organization Identifier (Org ID)</label>
                <input type="text" id="reg-org" placeholder="e.g. ALPHA-MED-01">
            </div>

            <div class="form-group">
                <label>Administrative Email Address</label>
                <input type="email" id="reg-email" placeholder="admin@hospital.org">
            </div>

            <label>Compliance Bundle (Softcopy Uploads Required)</label>
            <div class="compliance-grid">
                <div class="file-input-wrapper">
                    <label style="font-size: 0.75rem;">BAA (Business Assoc. Agreement)</label>
                    <input type="file" id="file-baa" class="compliance-file" onchange="checkUploads()">
                    <div id="hash-baa" class="hash-tag hidden"></div>
                </div>
                <div class="file-input-wrapper">
                    <label style="font-size: 0.75rem;">DUA (Data Use Agreement)</label>
                    <input type="file" id="file-dua" class="compliance-file" onchange="checkUploads()">
                    <div id="hash-dua" class="hash-tag hidden"></div>
                </div>
                <div class="file-input-wrapper" style="grid-column: span 2;">
                    <label style="font-size: 0.75rem;">SBOM (Software Bill of Materials)</label>
                    <input type="file" id="file-sbom" class="compliance-file" onchange="checkUploads()">
                    <div id="hash-sbom" class="hash-tag hidden"></div>
                </div>
            </div>

            <button id="btn-sign-seal" class="btn-seal" onclick="signAndSeal()">Sign & Seal Documents</button>

            <button id="btn-verify-register" class="btn hidden" onclick="startSecurityVerification()">Verify & Register Hardware</button>
        </div>
    </div>

    <!-- TIPPSS Certificate Overlay -->
    <div id="cert-overlay" class="certificate-overlay">
        <div class="cert-box">
            <div class="cert-watermark">CONFIDENTIAL</div>
            <div style="font-size: 0.8rem; color: #7F8C8D; letter-spacing: 2px;">CERTIFICATE OF COMPLIANCE</div>
            <h1 style="color: var(--hosp-navy); margin: 1rem 0;">TIPPSS SECURE NODE</h1>
            <div style="border-top: 1px solid #EEE; border-bottom: 1px solid #EEE; padding: 2rem 0; margin: 2rem 0;">
                <p style="margin-bottom: 0.5rem; font-size: 0.9rem;">This document certifies that</p>
                <h3 id="cert-org-name" style="margin: 0; color: var(--hosp-blue);">GENERAL HOSPITAL</h3>
                <p style="margin-top: 0.5rem; font-size: 0.8rem; color: #7F8C8D;">LEI: <span id="cert-lei-val" style="color: #333; font-weight: 600;">---</span></p>
                
                <div style="margin-top: 2rem; text-align: left; font-size: 0.7rem; background: #F9F9F9; padding: 1rem; border-radius: 4px;">
                    <div style="font-weight: 700; margin-bottom: 5px; color: var(--hosp-navy);">DIGITAL SIGNATURE HASHES</div>
                    <div id="cert-hashes"></div>
                </div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div style="text-align: left;">
                    <div style="font-size: 0.7rem; color: #7F8C8D;">ISSUE DATE</div>
                    <div id="cert-date" style="font-size: 0.8rem; font-weight: 700;">---</div>
                </div>
                <button class="btn" style="width: auto; padding: 10px 25px; margin-top: 0;" onclick="window.location.href='/'">Access Dashboard</button>
            </div>
        </div>
    </div>

    <!-- Cyber-Scan Overlay -->
    <div id="cyber-scan-overlay">
        <div class="spinner"></div>
        <h3 style="margin-bottom: 1.5rem; letter-spacing: 2px;">SECURITY PROTOCOL INITIALIZED</h3>
        <div class="terminal-box" id="terminal-output">
            <!-- Terminal lines injected here -->
        </div>
    </div>

    <div id="toast" class="toast">Integrity Verified</div>

    <script>
        const ADMIN_URL = "http://127.0.0.1:8000";
        let leiVerified = false;
        let docsSigned = false;
        const fileHashes = {};

        function showToast(message) {
            const t = document.getElementById('toast');
            t.innerText = message;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // LEI Verification Logic
        document.getElementById('reg-lei').addEventListener('input', async (e) => {
            const val = e.target.value;
            const statusDiv = document.getElementById('lei-verification-status');
            const loader = document.getElementById('lei-loader');
            const text = document.getElementById('lei-text');

            if (val.length === 20) {
                statusDiv.classList.remove('hidden');
                loader.classList.remove('hidden');
                text.innerText = "Checking Global Database...";
                text.style.color = "var(--hosp-blue)";
                
                await sleep(2000);
                
                loader.classList.add('hidden');
                text.innerText = "✅ LEI Verified: General Hospital (Active)";
                text.style.color = "#27AE60";
                leiVerified = true;
                checkOnboardingProgress();
            } else {
                statusDiv.classList.add('hidden');
                leiVerified = false;
                checkOnboardingProgress();
            }
        });

        function checkUploads() {
            const files = document.querySelectorAll('.compliance-file');
            let allUploaded = true;
            files.forEach(f => {
                if (f.files.length === 0) allUploaded = false;
            });

            const btn = document.getElementById('btn-sign-seal');
            if (allUploaded) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        async function signAndSeal() {
            const files = document.querySelectorAll('.compliance-file');
            const docNames = ['baa', 'dua', 'sbom'];
            
            for (let i = 0; i < files.length; i++) {
                const name = docNames[i];
                const hash = 'SHA-256: ' + Array.from(crypto.getRandomValues(new Uint8Array(16)))
                    .map(b => b.toString(16).padStart(2, '0')).join('') + '...';
                
                fileHashes[name] = hash;
                const hashElem = document.getElementById(`hash-${name}`);
                if (hashElem) {
                    hashElem.innerText = hash;
                    hashElem.classList.remove('hidden');
                }
            }

            docsSigned = true;
            document.getElementById('btn-sign-seal').innerText = "✓ Digital Identity & Docs Signed";
            document.getElementById('btn-sign-seal').style.background = "#27AE60";
            document.getElementById('btn-sign-seal').style.pointerEvents = "none";
            
            checkOnboardingProgress();
        }

        function checkOnboardingProgress() {
            const btnVerify = document.getElementById('btn-verify-register');
            if (leiVerified && docsSigned) {
                btnVerify.classList.remove('hidden');
            } else {
                btnVerify.classList.add('hidden');
            }
        }

        async function startSecurityVerification() {
            const org_id = document.getElementById('reg-org').value;
            const email = document.getElementById('reg-email').value;
            const lei = document.getElementById('reg-lei').value;

            if (!org_id || !email) {
                alert("Please fill in Org ID and Email.");
                return;
            }

            // Start Animation
            document.getElementById('cyber-scan-overlay').style.display = 'flex';
            const terminal = document.getElementById('terminal-output');
            terminal.innerHTML = '';

            // Step 1: Document & LEI Audit
            await addTerminalLine(`[AUDIT] Initializing TIPPSS Compliance Audit...`, 'scan-status-wait');
            await sleep(600);
            await addTerminalLine(`[AUDIT] Cross-referencing LEI ${lei} with Global DB...`, 'scan-status-wait');
            await sleep(800);
            await addTerminalLine(`[OK] Legal Entity Verified.`, 'scan-status-ok');
            
            const docNames = ['BAA', 'DUA', 'SBOM'];
            for (let name of docNames) {
                await addTerminalLine(`[AUDIT] Verifying signed ${name} package integrity...`, 'scan-status-wait');
                await sleep(500);
                await addTerminalLine(`[OK] ${name} hash matches digital signature.`, 'scan-status-ok');
            }
            await sleep(400);

            // Step 2: Hardware Simulation
            await addTerminalLine(`[WAIT] TIPPSS Phase 2: Secure Hardware Handshake...`, 'scan-status-wait');
            await sleep(1000);
            await addTerminalLine(`[OK] Hardware Identity Confirmed.`, 'scan-status-ok');
            await sleep(500);
            await addTerminalLine(`[SECURE] TEE (Trusted Execution Environment) Isolated.`, 'scan-status-secure');
            await sleep(700);
            await addTerminalLine(`[OK] Remote Attestation Successful.`, 'scan-status-ok');
            await sleep(800);

            await addTerminalLine(`[INFO] Finalizing registration with aggregator...`, '');
            
            // Backend Call
            try {
                const res = await fetch(`${ADMIN_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        org_id, 
                        email,
                        lei,
                        node_url: window.location.origin,
                        compliance_bundle: {
                            verified: true,
                            signatures: fileHashes,
                            timestamp: new Date().toISOString()
                        }
                    })
                });
                const data = await res.json();
                
                if (data.status === 'verified') {
                    await addTerminalLine(`[SUCCESS] Assigned Node ID: ${data.node_id}`, 'scan-status-ok');
                    await sleep(1000);
                    
                    // Show Certificate
                    document.getElementById('cyber-scan-overlay').style.display = 'none';
                    document.getElementById('cert-overlay').style.display = 'flex';
                    document.getElementById('cert-org-name').innerText = org_id.toUpperCase();
                    document.getElementById('cert-lei-val').innerText = lei;
                    document.getElementById('cert-date').innerText = new Date().toLocaleDateString();
                    
                    const hashContainer = document.getElementById('cert-hashes');
                    hashContainer.innerHTML = '';
                    Object.entries(fileHashes).forEach(([k, v]) => {
                        hashContainer.innerHTML += `<div><strong>${k.toUpperCase()}:</strong> ${v}</div>`;
                    });
                    
                    // Add System-Generated TIPPSS Audit ID
                    const auditId = 'AUDIT-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                    hashContainer.innerHTML += `<div style="margin-top:10px; border-top:1px dashed #DDD; padding-top:5px; color:var(--hosp-green);"><strong>TIPPSS AUDIT ID:</strong> ${auditId}</div>`;

                    // PERSIST TO LOCAL NODE
                    try {
                        await fetch('/api/save_kyh', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                lei: lei,
                                doc_hashes: fileHashes
                            })
                        });
                    } catch (e) {
                        console.error("Local state persistence failed:", e);
                    }

                } else {
                    await addTerminalLine(`[ERROR] Registration rejected by server.`, 'scan-status-red');
                }
            } catch (e) {
                await addTerminalLine(`[ERROR] Aggregator communication failure.`, 'scan-status-red');
                setTimeout(() => {
                    document.getElementById('cyber-scan-overlay').style.display = 'none';
                    alert("Registration failed. Please check server connection.");
                }, 2000);
            }
        }

        function addTerminalLine(text, className) {
            return new Promise(resolve => {
                const line = document.createElement('div');
                line.className = 'scan-line ' + className;
                line.innerText = '> ' + text;
                document.getElementById('terminal-output').appendChild(line);
                document.getElementById('terminal-output').scrollTop = document.getElementById('terminal-output').scrollHeight;
                setTimeout(resolve, 100);
            });
        }

        function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
    </script>
</body>
</html>
